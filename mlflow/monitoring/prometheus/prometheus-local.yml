# Prometheus Configuration for Local Docker Compose Testing
# This is a simplified version for local development

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'mlops-local'
    environment: 'development'

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          component: 'prometheus'

  # MLOps API Service (Docker Compose)
  - job_name: 'mlops-api'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['api:8000']  # Docker service name
        labels:
          service: 'api'
          component: 'model-serving'
    # For host.docker.internal (if API runs on host)
    # static_configs:
    #   - targets: ['host.docker.internal:8000']

  # MLflow Tracking Server (if running)
  - job_name: 'mlflow'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['mlflow:5000']
        labels:
          service: 'mlflow'
          component: 'experiment-tracking'

  # If API is running on host machine (not in Docker)
  - job_name: 'mlops-api-host'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'api'
          component: 'model-serving'
          location: 'host'
