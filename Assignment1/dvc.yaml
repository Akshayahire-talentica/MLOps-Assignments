stages:
  data_ingestion:
    cmd: python src/data_ingestion/run_ingestion.py
    deps:
      - src/data_ingestion/ingest_movies.py
      - src/data_ingestion/run_ingestion.py
      - config/data_ingestion_config.yaml
      - data/raw/movies.dat
      - data/raw/ratings.dat
      - data/raw/users.dat
    outs:
      - data/processed:
          cache: true

  data_validation:
    cmd: python src/data_validation/run_validation.py
    deps:
      - data/processed
      - src/data_validation/run_validation.py
      - src/data_validation/run_ge_validation.py
      - src/data_validation/ge_utils.py
      - config/ge_validation.yaml
    outs:
      - data/validated:
          cache: true

  feature_engineering:
    cmd: python src/features/run_feature_engineering.py
    deps:
      - data/raw/movies.dat
      - data/raw/ratings.dat
      - data/raw/users.dat
      - src/features/feature_engineering.py
      - src/features/run_feature_engineering.py
      - config/data_ingestion_config.yaml
    outs:
      - data/features:
          cache: true
    metrics:
      - reports/feature_engineering_metadata.json:
          cache: false
