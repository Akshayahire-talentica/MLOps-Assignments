# ============================================================
# MLOps POC — Local Self-Hosted Stack
# Uses real AWS S3 for data/artifacts (no MinIO).
# Docker images are built locally — no ECR needed.
# ============================================================

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mlops:mlops123@postgres:5432/airflow_db
  AIRFLOW__CORE__FERNET_KEY: 'UKMzEm3yIuFYEq92ahKy1Mvz5yqGHmzfJVcRVxKvP-g='
  AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
  MLFLOW_TRACKING_URI: http://mlflow:5000
  USE_LOCAL_STORAGE: 'true'

x-airflow-volumes: &airflow-volumes
  - ./airflow/dags:/opt/airflow/dags
  - ./src:/opt/airflow/src
  - ./config:/opt/airflow/config
  - ./data:/opt/airflow/data
  - airflow_logs:/opt/airflow/logs

services:
  # ─── Infrastructure ──────────────────────────────────────

  postgres:
    image: postgres:14-alpine
    container_name: mlops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: mlops123
      POSTGRES_DB: mlops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlops -d mlops_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlops-network

  # ─── MLflow (local artifacts) ───────────────────────────

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    image: mlops-mlflow:local
    container_name: mlops-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://mlops:mlops123@postgres:5432/mlops_db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlruns/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://mlops:mlops123@postgres:5432/mlops_db
      --default-artifact-root /mlruns/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 90s
    volumes:
      - ./mlruns:/mlruns
    networks:
      - mlops-network

  # ─── Airflow ─────────────────────────────────────────────

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: mlops-airflow:local
    container_name: mlops-airflow-init
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - bash
      - -c
      - >-
        airflow db upgrade &&
        airflow users create --username admin --password admin123 --firstname Admin --lastname User --role Admin --email admin@mlops.local || true
    volumes: *airflow-volumes
    networks:
      - mlops-network

  # ─── Airflow Webserver ────────────────────────────────────

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: mlops-airflow:local
    container_name: mlops-airflow-webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    ports:
      - "8080:8080"
    command: airflow webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes: *airflow-volumes
    networks:
      - mlops-network

  # ─── Airflow Scheduler ────────────────────────────────────

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: mlops-airflow:local
    container_name: mlops-airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    command: airflow scheduler
    volumes: *airflow-volumes
    networks:
      - mlops-network

  # ─── Model Services ───────────────────────────────────────

  api-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: mlops-api:local
    container_name: mlops-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME: nmf_recommendation_production
      MODEL_STAGE: Production
      USE_LOCAL_STORAGE: 'true'
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - mlops-network
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./mlruns:/mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  model-v2-service:
    build:
      context: .
      dockerfile: Dockerfile.v2
    image: mlops-model-v2:local
    container_name: mlops-model-v2
    restart: unless-stopped
    ports:
      - "8001:8080"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME: nmf_recommendation_v2
      USE_LOCAL_STORAGE: 'true'
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - mlops-network
    volumes:
      - ./mlruns:/mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  router-service:
    build:
      context: .
      dockerfile: Dockerfile.router
    image: mlops-router:local
    container_name: mlops-router
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      V1_URL: http://api-service:8000
      V2_URL: http://model-v2-service:8080
      V2_TRAFFIC_PERCENTAGE: 30
    depends_on:
      api-service:
        condition: service_healthy
      model-v2-service:
        condition: service_healthy
    networks:
      - mlops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Streamlit UI ─────────────────────────────────────────

  streamlit-ui:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    image: mlops-streamlit:local
    container_name: mlops-streamlit-ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api-service:8000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AIRFLOW_URL: http://airflow-webserver:8080
      USE_LOCAL_STORAGE: 'true'
      DOCKER_ENV: "true"
    depends_on:
      api-service:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    networks:
      - mlops-network
    volumes:
      - ./src/ui:/app/ui
      - ./data:/app/data
      - ./.streamlit:/app/.streamlit
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Event Collector (Feedback Loop) ─────────────────────

  event-collector:
    build:
      context: .
      dockerfile: Dockerfile.event_collector
    image: mlops-event-collector:local
    container_name: mlops-event-collector
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: mlops_db
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: mlops123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mlops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Monitoring ───────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: mlops-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - mlops-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.2.0
    container_name: mlops-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: ''
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - mlops-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

# ─── Volumes & Networks ──────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  airflow_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  mlops-network:
    driver: bridge
